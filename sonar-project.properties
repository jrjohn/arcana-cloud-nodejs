# SonarQube Project Configuration
# https://docs.sonarqube.org/latest/project-administration/narrowing-the-focus/

sonar.projectKey=arcana-cloud-nodejs
sonar.projectName=arcana-cloud-nodejs
sonar.projectVersion=1.0

# Source directories to analyze
sonar.sources=src
sonar.tests=tests

# Language
sonar.language=ts

# Encoding
sonar.sourceEncoding=UTF-8

# ── Exclusions ────────────────────────────────────────────────────────────────
# Exclude generated coverage reports (these are NOT source code)
sonar.exclusions=\
  coverage/**,\
  docs/test-reports/coverage/**,\
  **/lcov-report/**,\
  **/lcov.info,\
  **/*.lcov,\
  dist/**,\
  node_modules/**,\
  src/grpc/generated/**

# Test file exclusions from main analysis
sonar.test.exclusions=\
  **/*.test.ts,\
  **/*.spec.ts,\
  tests/**

# Coverage report path (for SonarQube to import, not scan)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Files with no unit-testable runtime logic — excluded from the coverage metric
# so the gate measures the real tested surface (kept in sync with the Jenkinsfile
# -Dsonar.coverage.exclusions and vitest.config.ts coverage.exclude). These are
# entry points / bootstrap (index, app, grpc-server), generated/proto, type-only
# interfaces + DAO re-exports + the OAuthToken model, and barrel index.ts files.
# vitest v4's coverage-v8 surfaced these as 0% (partial/absent under v2),
# dragging SonarQube coverage 80->79.5 even though real unit coverage is ~88%.
sonar.coverage.exclusions=\
  src/index.ts,\
  src/app.ts,\
  src/grpc/grpc-server.ts,\
  src/grpc/generated/**,\
  src/grpc/protos/**,\
  src/dao/**,\
  src/types/**,\
  src/**/*.interface.ts,\
  src/**/index.ts,\
  src/models/oauth-token.model.ts

# ── TypeScript ────────────────────────────────────────────────────────────────
sonar.typescript.tsconfigPath=tsconfig.json
