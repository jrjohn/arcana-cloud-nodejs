# arcana-cloud-nodejs — 3-layer gRPC CI compose
# Usage: NODE_IMAGE=localhost:5000/arcana/node-app:build-N docker compose -p arcana-ci-node-grpc -f deployment/layered/docker-compose-ci-grpc.yml up -d
version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: arcana-ci-node-grpc-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ci_root
      MYSQL_DATABASE: arcana_cloud
      MYSQL_USER: arcana
      MYSQL_PASSWORD: ci_arcana
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - arcana-ci-node-grpc-net

  redis:
    image: redis:7-alpine
    container_name: arcana-ci-node-grpc-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - arcana-ci-node-grpc-net

  repository:
    image: ${NODE_IMAGE:-localhost:5000/arcana/node-app:latest}
    container_name: arcana-ci-node-grpc-repository
    # Run Prisma migrations before starting the app
    command: sh -c "npx prisma db push --skip-generate --accept-data-loss 2>&1 || true; node dist/index.js"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: testing
      PORT: "3002"
      GRPC_PORT: "9093"
      DATABASE_URL: "mysql://arcana:ci_arcana@mysql:3306/arcana_cloud"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "ci-secret-key-minimum-32-characters-long-for-testing"
      DEPLOYMENT_MODE: layered
      DEPLOYMENT_LAYER: repository
      COMMUNICATION_PROTOCOL: grpc
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - arcana-ci-node-grpc-net

  service:
    image: ${NODE_IMAGE:-localhost:5000/arcana/node-app:latest}
    container_name: arcana-ci-node-grpc-service
    depends_on:
      repository:
        condition: service_healthy
    environment:
      NODE_ENV: testing
      PORT: "3001"
      GRPC_PORT: "9092"
      DATABASE_URL: "mysql://arcana:ci_arcana@mysql:3306/arcana_cloud"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "ci-secret-key-minimum-32-characters-long-for-testing"
      DEPLOYMENT_MODE: layered
      DEPLOYMENT_LAYER: service
      COMMUNICATION_PROTOCOL: grpc
      REPOSITORY_URLS: "arcana-ci-node-grpc-repository:9093"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - arcana-ci-node-grpc-net

  controller:
    image: ${NODE_IMAGE:-localhost:5000/arcana/node-app:latest}
    container_name: arcana-ci-node-grpc-controller
    depends_on:
      service:
        condition: service_healthy
    environment:
      NODE_ENV: testing
      PORT: "3000"
      DATABASE_URL: "mysql://arcana:ci_arcana@mysql:3306/arcana_cloud"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "ci-secret-key-minimum-32-characters-long-for-testing"
      DEPLOYMENT_MODE: layered
      DEPLOYMENT_LAYER: controller
      COMMUNICATION_PROTOCOL: grpc
      SERVICE_URLS: "arcana-ci-node-grpc-service:9092"
    ports:
      - "18094:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - arcana-ci-node-grpc-net

networks:
  arcana-ci-node-grpc-net:
    driver: bridge
    name: arcana-ci-node-grpc-net
